name: Tauri Studio Release

on:
  workflow_dispatch:
  push:
    tags:
      - "studio-v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm run sync:version
      - run: npm run check
      - run: npm run build:sidecar
      - run: npm run tauri:build
        env:
          CI: true
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ai-music-studio-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm run sync:version
      - run: npm run check
      - run: npm run build:sidecar
      - run: cd src-tauri && cargo tauri build
        env:
          CI: true
      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: ai-music-studio-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libmp3lame-dev
      - run: npm ci
      - run: npm run sync:version
      - run: npm run check
      - run: npm run build:sidecar
      - run: cd src-tauri && cargo tauri build
        env:
          CI: true
      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: ai-music-studio-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm

  publish-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/studio-v')
    steps:
      - uses: actions/checkout@v4
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Collect release installers
        run: |
          mkdir -p release-installers
          find release-artifacts -type f \( \
            -iname '*.exe' -o \
            -iname '*.msi' -o \
            -iname '*.dmg' -o \
            -iname '*.deb' -o \
            -iname '*.AppImage' -o \
            -iname '*.rpm' \
          \) -exec cp -t release-installers {} +
          echo "Release installers:"
          ls -lh release-installers
          count=$(find release-installers -type f | wc -l)
          if [ "$count" -lt 3 ]; then
            echo "Expected at least 3 installer files, found $count"
            find release-artifacts -type f | head -50
            exit 1
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AI Music Creator Studio ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          overwrite_files: true
          files: release-installers/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
