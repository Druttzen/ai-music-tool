name: Tauri Studio Release

on:
  workflow_dispatch:
  push:
    tags:
      - "studio-v*"

permissions:
  contents: write

jobs:
  build-and-sign:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libmp3lame-dev
      - run: npm ci
      - run: npm run sync:version
      - run: npm run check:full
      - name: Build signed Studio bundles and updater manifest
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tauriScript: cargo tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/studio-v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/studio-v') && format('AI Music Creator Studio {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          updaterJsonPreferNsis: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          uploadWorkflowArtifacts: true
          retryAttempts: 2

  publish-release:
    needs: build-and-sign
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/studio-v')
    steps:
      - name: Verify updater manifest and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          assets=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          echo "$assets"
          echo "$assets" | grep -qx 'latest.json'
          echo "$assets" | grep -q '\.sig$'
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest
