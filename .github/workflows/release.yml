name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to rebuild (e.g. v0.47.1)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm run check:full
      - name: Extract release notes from README
        shell: bash
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          export TAG_VER="${VERSION#v}"
          node <<'NODE'
          const fs = require("fs");
          const ver = (process.env.TAG_VER || "").replace(/^v/, "");
          const lines = fs.readFileSync("README.md", "utf8").split(/\r?\n/);
          const header = `## Highlights (v${ver})`;
          const start = lines.findIndex((line) => line.startsWith(header));
          let out = [];
          if (start >= 0) {
            for (let i = start; i < lines.length; i++) {
              if (i > start && /^## Highlights \(v/.test(lines[i])) break;
              out.push(lines[i]);
            }
          }
          if (!out.length) out = [`Release v${ver}`];
          fs.writeFileSync("release-notes.md", out.join("\n") + "\n");
          NODE
      - run: npm run build && npm run build:readme-pdf && npm run prepare:electron-dist
      - name: Remove partial GitHub release (avoid electron-builder 422)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -e
          REPO="${GITHUB_REPOSITORY}"
          RELEASE_ID=$(gh api "repos/${REPO}/releases/tags/${TAG}" --jq .id 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            echo "Deleting existing release ${TAG} (id ${RELEASE_ID})"
            gh api -X DELETE "repos/${REPO}/releases/${RELEASE_ID}"
          else
            echo "No existing release for ${TAG}"
          fi
      - name: Build and publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/run-electron-builder.cjs --publish always
      - name: Ensure all installer assets on GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -e
          OUT=$(cat build/.electron-dist-output 2>/dev/null || echo electron-dist)
          shopt -s nullglob
          files=("${OUT}"/*Setup*.exe "${OUT}"/*Setup*.exe.blockmap "${OUT}"/latest.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No installer artifacts in ${OUT}"
            exit 1
          fi
          echo "Uploading ${#files[@]} asset(s) to ${TAG}"
          gh release upload "$TAG" "${files[@]}" --clobber
