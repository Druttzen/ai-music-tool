name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to rebuild (e.g. v0.47.1)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm run check:full
      - name: Extract release notes from README
        shell: bash
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          export TAG_VER="${VERSION#v}"
          node <<'NODE'
          const fs = require("fs");
          const ver = (process.env.TAG_VER || "").replace(/^v/, "");
          const lines = fs.readFileSync("README.md", "utf8").split(/\r?\n/);
          const header = `## Highlights (v${ver})`;
          const start = lines.findIndex((line) => line.startsWith(header));
          let out = [];
          if (start >= 0) {
            for (let i = start; i < lines.length; i++) {
              if (i > start && /^## Highlights \(v/.test(lines[i])) break;
              out.push(lines[i]);
            }
          }
          if (!out.length) out = [`Release v${ver}`];
          fs.writeFileSync("release-notes.md", out.join("\n") + "\n");
          NODE
      - run: npm run build && npm run build:readme-pdf && npm run prepare:electron-dist
      # Build only — electron-builder's GitHub publisher races itself (parallel
      # create-release for .exe + .blockmap → 422 already_exists) and is brittle
      # on GitHub upload 5xx. Upload assets with gh instead.
      - name: Build Windows installer
        run: node scripts/run-electron-builder.cjs --publish never
      - name: Ensure GitHub release and upload installer assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          OUT=$(cat build/.electron-dist-output 2>/dev/null || echo electron-dist)
          shopt -s nullglob
          files=("${OUT}"/*Setup*.exe "${OUT}"/*Setup*.exe.blockmap "${OUT}"/latest.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No installer artifacts in ${OUT}"
            ls -la "${OUT}" || true
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — updating notes and assets"
            gh release edit "$TAG" --notes-file release-notes.md --title "${TAG#v}"
          else
            echo "Creating release ${TAG}"
            gh release create "$TAG" \
              --title "${TAG#v}" \
              --notes-file release-notes.md \
              --verify-tag
          fi

          echo "Uploading ${#files[@]} asset(s) to ${TAG}"
          for attempt in 1 2 3; do
            if gh release upload "$TAG" "${files[@]}" --clobber; then
              echo "Upload succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Upload attempt ${attempt} failed; waiting before retry..."
            sleep $((attempt * 15))
          done
          echo "All upload attempts failed"
          exit 1
