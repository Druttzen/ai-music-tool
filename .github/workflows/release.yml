name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm run check:full
      - name: Extract release notes from README
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          export TAG_VER="${VERSION#v}"
          node <<'NODE'
          const fs = require("fs");
          const ver = (process.env.TAG_VER || "").replace(/^v/, "");
          const lines = fs.readFileSync("README.md", "utf8").split(/\r?\n/);
          const header = `## Highlights (v${ver})`;
          const start = lines.findIndex((line) => line.startsWith(header));
          let out = [];
          if (start >= 0) {
            for (let i = start; i < lines.length; i++) {
              if (i > start && /^## Highlights \(v/.test(lines[i])) break;
              out.push(lines[i]);
            }
          }
          if (!out.length) out = [`Release v${ver}`];
          fs.writeFileSync("release-notes.md", out.join("\n") + "\n");
          NODE
      - run: npm run build && npm run build:readme-pdf && npm run prepare:electron-dist
      - name: Build and publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/run-electron-builder.cjs --publish always
