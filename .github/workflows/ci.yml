name: CI

on:
  push:
    branches: [master, main, "cursor/**"]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run check

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start AI sidecar for e2e
        run: |
          python -m pip install --upgrade pip
          pip install -e ai-sidecar
          bash scripts/start-sidecar.sh
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8723/health >/dev/null && break
            sleep 0.5
          done
          curl -sf http://127.0.0.1:8723/health
      - run: npm run test:e2e

  dsp-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd dsp-core && cargo test --locked

  sidecar-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install sidecar + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ai-sidecar pytest httpx
      - run: pytest ai-sidecar/tests -q
