name: CI

on:
  push:
    branches: [master, main, "cursor/**"]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm run check:full

  awesome-suno-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Verify CC0 catalog matches import (rotation offset 0)
        env:
          AIMC_CC0_ROTATE_OFFSET: "0"
        run: |
          npm run import:awesome-suno
          git diff --exit-code app/lib/awesome-suno-concepts-synced.js

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start AI sidecar for e2e
        run: |
          python -m pip install --upgrade pip
          pip install -e ai-sidecar
          bash scripts/start-sidecar.sh
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8723/health >/dev/null && break
            sleep 0.5
          done
          curl -sf http://127.0.0.1:8723/health
      - run: npm run test:e2e

  e2e-vocal:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Install vocal extra and run vocal e2e subset
        run: |
          python -m pip install --upgrade pip
          bash scripts/install-sidecar-vocal.sh
          bash scripts/stop-sidecar.sh || true
          bash scripts/start-sidecar.sh --idle-exit-sec 0
          for i in $(seq 1 45); do
            curl -sf http://127.0.0.1:8723/health && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8723/health
          curl -sf http://127.0.0.1:8723/vocal-embed/models
          node scripts/run-e2e-vocal.cjs

  e2e-musicgen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start AI sidecar and run MusicGen e2e subset
        run: |
          python -m pip install --upgrade pip
          pip install -e ai-sidecar
          bash scripts/start-sidecar.sh
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8723/health >/dev/null && break
            sleep 0.5
          done
          curl -sf http://127.0.0.1:8723/health
          node scripts/run-e2e-musicgen.cjs

  e2e-subset:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start AI sidecar and run e2e subset
        run: |
          python -m pip install --upgrade pip
          pip install -e ai-sidecar
          bash scripts/start-sidecar.sh
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8723/health >/dev/null && break
            sleep 0.5
          done
          curl -sf http://127.0.0.1:8723/health
          node scripts/run-e2e-subset.cjs

  dsp-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libmp3lame (native MP3 export)
        run: sudo apt-get update && sudo apt-get install -y libmp3lame-dev
      - run: cd dsp-core && cargo test --locked

  tauri-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libmp3lame-dev
      - run: npm ci
      - run: npm run build
      - run: npm run build:sidecar
      - run: cd src-tauri && cargo build --locked
