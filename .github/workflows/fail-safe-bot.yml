name: Fail-safe bot

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  pull-requests: write
  contents: read

jobs:
  diagnose-pr:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Fetch failed log and classify
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          gh run view "${{ github.event.workflow_run.id }}" --log-failed > /tmp/ci-fail.log || true
          node scripts/fail-safe-bot-comment.cjs /tmp/ci-fail.log > /tmp/bot-comment.md

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No PR for this workflow run — skipping comment"
            exit 0
          fi
          gh pr comment "$PR" --body-file /tmp/bot-comment.md

  diagnose-master:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Fetch failed log and classify
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          gh run view "${{ github.event.workflow_run.id }}" --log-failed > /tmp/ci-fail.log || true
          node scripts/fail-safe-bot-comment.cjs /tmp/ci-fail.log > /tmp/bot-comment.md

      - name: Comment on commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          gh api "repos/${{ github.repository }}/commits/${SHA}/comments" \
            -f body="$(cat /tmp/bot-comment.md)"
