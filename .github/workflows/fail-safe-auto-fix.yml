name: Fail-safe auto-fix

on:
  repository_dispatch:
    types: [fail-safe-fix-push]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Fail-safe fix, commit, push, PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/fail-safe-fix-and-push.cjs --ci --json
